<style>
  html { background: #171310; }
  body {
    margin: 0;
    background: #171310;
    color: #ddd6ca;
    font-family: "IBM Plex Sans", -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    display: flex;
    min-height: 100dvh;
    align-items: center;
    justify-content: center;
  }
  .lock { max-width: 20rem; padding: 1.5rem; text-align: center; }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #c9a96e;
    margin: 0 0 0.75rem;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    background: #1e1915;
    border: 1px solid rgba(221, 214, 202, 0.2);
    border-radius: 8px;
    color: #ddd6ca;
    font: inherit;
    padding: 0.7rem 0.9rem;
    text-align: center;
    margin: 0.25rem 0 0.75rem;
  }
  input:focus { outline: 2px solid #c9a96e; outline-offset: 1px; }
  button {
    width: 100%;
    background: #c9a96e;
    border: 0;
    border-radius: 8px;
    color: #171310;
    font: inherit;
    font-weight: 600;
    padding: 0.7rem 0.9rem;
    cursor: pointer;
  }
  .err { color: #b0563e; font-size: 0.9rem; min-height: 1.6rem; margin: 0.5rem 0 0; }
  .hint { color: #8f8677; font-size: 0.85rem; }
</style>
</head>

  </form>
  <p class="err" id="err"></p>
</div>

  var STORE = "canon-panel-pass";

  function b64(s) {
    var bin = atob(s), a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
  }

  async function unlock(pass) {
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64(PAYLOAD.salt), iterations: PAYLOAD.iterations, hash: "SHA-256" },
      keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    var plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(PAYLOAD.iv) }, key, b64(PAYLOAD.ct));
    return new TextDecoder().decode(plain);
  }

  async function tryPass(pass, remember) {
    try {
      var html = await unlock(pass);
      if (remember) try { localStorage.setItem(STORE, pass); } catch (e) {}
      document.open();
      document.write(html);
      document.close();
      return true;
    } catch (e) {
      return false;
    }
  }

  document.getElementById("f").addEventListener("submit", async function (ev) {
    ev.preventDefault();
    var ok = await tryPass(document.getElementById("p").value, true);
    if (!ok) document.getElementById("err").textContent = "That password did not open it. Try again.";
  });

  (function () {
    var saved = null;
    try { saved = localStorage.getItem(STORE); } catch (e) {}
    if (saved) tryPass(saved, false).then(function (ok) {
      if (!ok) try { localStorage.removeItem(STORE); } catch (e) {}

  })();
