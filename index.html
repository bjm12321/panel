    iterations: 600000
  };
  var STORE = "canon-panel-pass";

  function b64(s) {
    var bin = atob(s), a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
  }

  async function unlock(pass) {
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64(PAYLOAD.salt), iterations: PAYLOAD.iterations, hash: "SHA-256" },
      keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    var plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(PAYLOAD.iv) }, key, b64(PAYLOAD.ct));
    return new TextDecoder().decode(plain);
  }

  async function tryPass(pass, remember) {
    try {
      var html = await unlock(pass);
      if (remember) try { localStorage.setItem(STORE, pass); } catch (e) {}
      document.open();
      document.write(html);
      document.close();
      return true;
    } catch (e) {
      return false;
    }
  }

  document.getElementById("f").addEventListener("submit", async function (ev) {
    ev.preventDefault();
    var typed = document.getElementById("p").value.trim();
    var ok = await tryPass(typed, true);
    if (!ok) document.getElementById("err").textContent = "That password did not open it. Try again.";
  });

  (function () {
    var saved = null;
    try { saved = localStorage.getItem(STORE); } catch (e) {}
    if (saved) tryPass(saved, false).then(function (ok) {
      if (!ok) try { localStorage.removeItem(STORE); } catch (e) {}
